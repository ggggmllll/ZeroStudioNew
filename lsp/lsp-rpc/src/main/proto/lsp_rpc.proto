syntax = "proto3";

import "lsp_base.proto";
import "google/protobuf/struct.proto";

package com.itsaky.androidide.lsp.rpc;

option java_multiple_files = true;

// 错误响应对象
message ResponseError {
    int32 code = 1;
    string message = 2;
    google.protobuf.Value data = 3; // 可选的结构化错误数据
}

// 标准请求信封
message LspRequest {
    LspId id = 1;
    string method = 2;
    google.protobuf.Value params = 3;
}

// 标准响应信封
message LspResponse {
    LspId id = 1;
    oneof result_or_error {
        google.protobuf.Value result = 2;
        ResponseError error = 3;
    }
}

// 标准通知信封 (无 ID)
message LspNotification {
    string method = 1;
    google.protobuf.Value params = 2;
}

// 核心服务定义：定义客户端与服务端之间的双向流
service LspService {
    // 所有的通信通过一个双向流完成，模拟长连接
    rpc Connection(stream LspMessage) returns (stream LspMessage);
}

// 统一消息封装
message LspMessage {
    oneof message {
        LspRequest request = 1;
        LspResponse response = 2;
        LspNotification notification = 3;
    }
}