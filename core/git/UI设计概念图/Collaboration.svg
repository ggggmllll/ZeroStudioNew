<svg width="790" height="860" viewBox="0 0 790 860" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 样式复用 Core 组的样式，此处简写 -->
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .text-xs { font-size: 11px; font-weight: 500; }
        .text-sm { font-size: 13px; }
        .text-base { font-size: 15px; font-weight: 700; }
        
        .fill-bg { fill: #000000; }
        .fill-surface { fill: #1E1E1E; }
        .fill-surface-container { fill: #252525; }
        .fill-surface-bright { fill: #383838; }
        .fill-primary { fill: #D0BCFF; }
        .fill-primary-dim { fill: rgba(208, 188, 255, 0.1); }
        .fill-on-surface { fill: #E6E1E5; }
        .fill-on-surface-var { fill: #CAC4D0; }
        .fill-outline { fill: #8E8E93; }
        .fill-success { fill: #81C784; }
        .fill-error { fill: #F28B82; }
        .fill-running { fill: #64B5F6; }
        .fill-warning { fill: #FFB74D; }
    </style>
    
    <rect width="790" height="860" fill="#121212"/>

    <!-- ================= SCREEN 4: PIPELINES ================= -->
    <g transform="translate(20, 20)">
        <text x="20" y="-10" class="font-sans text-base fill-on-surface">4. 流水线 (Pipelines)</text>
        <rect width="360" height="800" rx="20" class="fill-bg" stroke="#333" stroke-width="4"/>
        
        <!-- Header -->
        <rect width="360" height="80" class="fill-surface-container"/>
        <g transform="translate(-100, 0)">
            <rect x="120" y="38" width="50" height="2" class="fill-primary"/>
            <text x="145" y="25" text-anchor="middle" class="font-sans text-xs fill-primary">流水线</text>
            <text x="195" y="25" text-anchor="middle" class="font-sans text-xs fill-outline">PRs</text>
        </g>
        
        <!-- Toolbar: CI Actions -->
        <g transform="translate(160, 46)">
            <rect width="28" height="28" rx="4" class="fill-surface-bright"/>
            <text x="14" y="19" text-anchor="middle" fill="white" font-size="16">↻</text>
            <rect x="36" y="0" width="28" height="28" rx="4" class="fill-surface-bright"/>
             <text x="50" y="19" text-anchor="middle" fill="white" font-size="12">■</text>
        </g>

        <!-- Content -->
        <g transform="translate(16, 100)">
            <text class="font-sans text-xs fill-outline">build.yml</text>
            
            <!-- Card 1: Running -->
            <g transform="translate(0, 20)">
                <rect width="328" height="110" rx="8" class="fill-surface-container" stroke="#64B5F6"/>
                <circle cx="20" cy="20" r="8" stroke="#64B5F6" stroke-width="2" stroke-dasharray="20 10" fill="none"/>
                <text x="40" y="24" class="font-sans text-base fill-on-surface">Update dependencies</text>
                <text x="290" y="24" class="font-mono text-xs fill-running">#402</text>
                
                <!-- Visualization -->
                <g transform="translate(40, 70)">
                    <circle cx="0" cy="0" r="6" class="fill-success"/>
                    <line x1="6" y1="0" x2="34" y2="0" stroke="#555"/>
                    <circle cx="40" cy="0" r="6" class="fill-running"/>
                    <line x1="46" y1="0" x2="74" y2="0" stroke="#555"/>
                    <circle cx="80" cy="0" r="6" class="fill-surface-bright"/>
                </g>
                <text x="40" y="90" class="font-sans text-xs fill-running">Running Test...</text>
            </g>

            <!-- Card 2: Failed -->
            <g transform="translate(0, 145)">
                <rect width="328" height="80" rx="8" class="fill-surface-container"/>
                <circle cx="20" cy="20" r="8" class="fill-error"/>
                <text x="16" y="24" text-anchor="middle" fill="#000" font-weight="bold" font-size="10">X</text>
                <text x="40" y="24" class="font-sans text-base fill-on-surface">Fix layout bug</text>
                <text x="290" y="24" class="font-mono text-xs fill-error">#401</text>
                <text x="40" y="45" class="font-sans text-xs fill-outline">Failed 1h ago • 9f8e7d6</text>
            </g>
        </g>
    </g>

    <!-- ================= SCREEN 5: REQUESTS ================= -->
    <g transform="translate(410, 20)">
        <text x="20" y="-10" class="font-sans text-base fill-on-surface">5. 合并请求 (Requests)</text>
        <rect width="360" height="800" rx="20" class="fill-bg" stroke="#333" stroke-width="4"/>
        
        <!-- Header -->
        <rect width="360" height="80" class="fill-surface-container"/>
        <g transform="translate(-100, 0)">
            <text x="145" y="25" text-anchor="middle" class="font-sans text-xs fill-outline">流水线</text>
            <rect x="170" y="38" width="50" height="2" class="fill-primary"/>
            <text x="195" y="25" text-anchor="middle" class="font-sans text-xs fill-primary">PRs</text>
             <circle cx="215" cy="12" r="6" fill="#B3261E"/>
             <text x="215" y="15" text-anchor="middle" font-size="8" fill="white">2</text>
        </g>

        <!-- Content -->
        <g transform="translate(16, 100)">
            <!-- PR 1 -->
            <rect width="328" height="100" rx="8" class="fill-surface-container"/>
            <g transform="translate(12, 12)">
                <path d="M10 20 L5 20 L5 5 L10 5" stroke="#D0BCFF" fill="none" stroke-width="2"/>
                <text x="24" y="12" class="font-sans text-base fill-on-surface">Dark Mode Implementation</text>
                <rect x="24" y="24" width="30" height="16" rx="4" class="fill-surface-bright"/>
                <text x="39" y="35" text-anchor="middle" class="font-mono text-xs fill-on-surface-var">#45</text>
                <text x="60" y="35" class="font-sans text-xs fill-outline"> by AndroidZero</text>
                
                <line x1="0" y1="50" x2="304" y2="50" stroke="#333"/>
                
                <g transform="translate(0, 65)">
                    <text class="font-sans text-xs fill-success">✓ CI Passed</text>
                    <text x="220" class="font-sans text-xs fill-warning">Needs Review</text>
                    <circle cx="300" cy="-3" r="8" fill="#D0BCFF"/>
                    <text x="300" y="0" text-anchor="middle" font-size="9" fill="black" font-weight="bold">R</text>
                </g>
            </g>

            <!-- PR 2 -->
            <g transform="translate(0, 115)">
                 <rect width="328" height="80" rx="8" class="fill-surface-container"/>
                 <text x="36" y="24" class="font-sans text-base fill-on-surface">Update README.md</text>
                  <text x="36" y="45" class="font-sans text-xs fill-outline">#44 by NewComer</text>
            </g>
        </g>
    </g>
</svg>