<svg width="790" height="860" viewBox="0 0 790 860" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .fill-bg { fill: #000000; }
        .fill-surface { fill: #1E1E1E; }
        .fill-surface-container { fill: #252525; }
        .fill-primary { fill: #D0BCFF; }
        .fill-on-surface { fill: #E6E1E5; }
        .fill-outline { fill: #8E8E93; }
    </style>
    
    <rect width="790" height="860" fill="#121212"/>

    <!-- ================= SCREEN 4: COLLABORATION (Merged) ================= -->
    <g transform="translate(20, 20)">
        <text x="20" y="-10" class="font-sans" font-size="15" fill="#E6E1E5">4. 协作 (Collaboration) - Merged Tab</text>
        <rect width="360" height="800" rx="20" class="fill-bg" stroke="#333" stroke-width="4"/>
        
        <!-- Tab Bar (Optimized: 5 Tabs) -->
        <rect width="360" height="40" class="fill-surface-container"/>
        <text x="40" y="25" class="font-sans" font-size="11" fill="#8E8E93">变更</text>
        <text x="110" y="25" class="font-sans" font-size="11" fill="#8E8E93">分支</text>
        <text x="180" y="25" class="font-sans" font-size="11" fill="#8E8E93">历史</text>
        <text x="250" y="25" class="font-sans" font-size="11" fill="#D0BCFF" font-weight="bold">协作</text>
        <rect x="230" y="38" width="40" height="2" class="fill-primary"/>
        <text x="320" y="25" class="font-sans" font-size="11" fill="#8E8E93">搜索</text>

        <!-- Segmented Button Switcher -->
        <g transform="translate(16, 60)">
            <rect width="328" height="32" rx="16" stroke="#49454F" stroke-width="1" fill="none"/>
            <!-- Active: PRs -->
            <rect x="0" y="0" width="164" height="32" rx="16" fill="#4F378B" fill-opacity="0.3"/>
            <text x="82" y="20" text-anchor="middle" class="font-sans" font-size="12" fill="#D0BCFF" font-weight="bold">Pull Requests (2)</text>
            <!-- Inactive: Pipelines -->
            <text x="246" y="20" text-anchor="middle" class="font-sans" font-size="12" fill="#E6E1E5">Pipelines</text>
        </g>

        <!-- List Content (PRs) -->
        <g transform="translate(16, 110)">
            <!-- PR Card 1 -->
            <rect width="328" height="90" rx="8" class="fill-surface-container"/>
            <text x="12" y="24" class="font-sans" font-size="14" fill="#E6E1E5">Fix memory leak in ImageLoader</text>
            <text x="12" y="44" class="font-sans" font-size="11" fill="#8E8E93">#46 • opened 2h ago</text>
            
            <rect x="12" y="60" width="60" height="18" rx="4" fill="#1E3025"/>
            <text x="42" y="73" text-anchor="middle" class="font-sans" font-size="10" fill="#81C784">CI Passed</text>
        </g>
    </g>


    <!-- ================= SCREEN 5: SEARCH (New) ================= -->
    <g transform="translate(410, 20)">
        <text x="20" y="-10" class="font-sans" font-size="15" fill="#E6E1E5">5. 全局搜索 (Search) - New Tab</text>
        <rect width="360" height="800" rx="20" class="fill-bg" stroke="#333" stroke-width="4"/>
        
        <!-- Tab Bar -->
        <rect width="360" height="40" class="fill-surface-container"/>
        <text x="320" y="25" class="font-sans" font-size="11" fill="#D0BCFF" font-weight="bold">搜索</text>
        <rect x="300" y="38" width="40" height="2" class="fill-primary"/>

        <!-- Search Header -->
        <g transform="translate(16, 60)">
            <!-- Input -->
            <rect width="328" height="40" rx="20" class="fill-surface-container"/>
            <circle cx="20" cy="20" r="6" stroke="#8E8E93" stroke-width="1.5" fill="none"/>
            <line x1="24" y1="24" x2="28" y2="28" stroke="#8E8E93" stroke-width="1.5"/>
            <text x="40" y="25" class="font-sans" font-size="14" fill="#E6E1E5">fix login crash</text>
            
            <!-- Filters (Chips) -->
            <g transform="translate(0, 50)">
                <rect width="70" height="24" rx="8" fill="#4F378B"/>
                <text x="35" y="16" text-anchor="middle" class="font-sans" font-size="11" fill="#E6E1E5">Message</text>
                
                <rect x="80" width="60" height="24" rx="8" stroke="#49454F" fill="none"/>
                <text x="110" y="16" text-anchor="middle" class="font-sans" font-size="11" fill="#8E8E93">Hash</text>
                
                <rect x="150" width="60" height="24" rx="8" stroke="#49454F" fill="none"/>
                <text x="180" y="16" text-anchor="middle" class="font-sans" font-size="11" fill="#8E8E93">Author</text>
            </g>
        </g>

        <!-- Results List -->
        <g transform="translate(16, 150)">
            <text x="0" y="0" class="font-sans" font-size="11" fill="#8E8E93">3 Commits found</text>
            
            <!-- Result 1 -->
            <g transform="translate(0, 20)">
                <rect width="328" height="70" rx="8" class="fill-surface-container"/>
                <!-- Highlighted text -->
                <text x="12" y="24" class="font-sans" font-size="14" fill="#E6E1E5">WIP: <tspan fill="#FFB74D">fix login crash</tspan> on API 30</text>
                <text x="12" y="45" class="font-mono" font-size="11" fill="#D0BCFF">a1b2c3d</text>
                <text x="70" y="45" class="font-sans" font-size="11" fill="#8E8E93">• 2 hours ago</text>
            </g>
            
            <!-- Result 2 -->
             <g transform="translate(0, 100)">
                <rect width="328" height="70" rx="8" class="fill-surface-container"/>
                <text x="12" y="24" class="font-sans" font-size="14" fill="#E6E1E5">Attempt to <tspan fill="#FFB74D">fix login crash</tspan></text>
                <text x="12" y="45" class="font-mono" font-size="11" fill="#D0BCFF">9f8e7d6</text>
                 <text x="70" y="45" class="font-sans" font-size="11" fill="#8E8E93">• 1 day ago</text>
            </g>
        </g>
    </g>
</svg>