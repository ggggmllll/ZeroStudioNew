<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .text-xs { font-size: 11px; font-weight: 500; }
        .text-sm { font-size: 13px; font-weight: 500; }
        .text-base { font-size: 15px; font-weight: 700; }
        
        .fill-bg { fill: #000000; }
        .fill-surface { fill: #1E1E1E; }
        .fill-surface-container { fill: #2B2930; }
        .fill-input { fill: #383838; }
        .fill-primary { fill: #D0BCFF; }
        .fill-on-surface { fill: #E6E1E5; }
        .fill-outline { fill: #8E8E93; }
        .fill-error { fill: #F28B82; }
        .fill-success { fill: #81C784; }
        .stroke-border { stroke: #444; stroke-width: 1; }
    </style>
    
    <rect width="800" height="600" fill="#121212"/>

    <!-- ================= COLUMN 1 ================= -->

    <!-- 1. Projects Toolbar (项目列表) -->
    <g transform="translate(20, 20)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 1: PROJECTS</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- Search Bar -->
        <rect x="12" y="20" width="240" height="36" rx="18" class="fill-input"/>
        <circle cx="30" cy="38" r="5" stroke="#8E8E93" stroke-width="1.5" fill="none"/>
        <line x1="34" y1="42" x2="38" y2="46" stroke="#8E8E93" stroke-width="1.5"/>
        <text x="50" y="42" class="font-sans text-sm fill-outline">Search repositories...</text>
        
        <!-- Sort Button -->
        <rect x="260" y="20" width="36" height="36" rx="18" fill="none" class="stroke-border"/>
        <path d="M272 34 L284 34 M274 38 L282 38 M270 30 L286 30" stroke="#E6E1E5" stroke-width="1.5"/>
        
        <!-- Add New Button -->
        <rect x="304" y="20" width="44" height="36" rx="18" class="fill-primary"/>
        <text x="326" y="42" text-anchor="middle" class="font-sans text-base fill-surface-container">+</text>
    </g>

    <!-- 2. Changes Toolbar (变更/工作区) -->
    <g transform="translate(20, 100)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 2: CHANGES</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- Select All Checkbox -->
        <rect x="12" y="26" width="18" height="18" rx="2" stroke="#D0BCFF" stroke-width="2" fill="none"/>
        <text x="40" y="40" class="font-sans text-sm fill-on-surface">3 Files selected</text>
        
        <!-- Action Group -->
        <g transform="translate(200, 20)">
             <!-- Revert -->
             <rect x="0" y="0" width="36" height="36" rx="4" class="fill-input"/>
             <text x="18" y="22" text-anchor="middle" font-size="14" fill="#E6E1E5">↺</text>
             
             <!-- Stash -->
             <rect x="44" y="0" width="36" height="36" rx="4" class="fill-input"/>
             <path d="M12 12 L24 12 L24 24 L12 24 Z" stroke="#E6E1E5" stroke-width="1.5" fill="none"/>
             <path d="M18 16 L18 20" stroke="#E6E1E5"/>
             
             <!-- Commit Mode Toggle -->
             <rect x="88" y="0" width="60" height="36" rx="18" class="fill-primary"/>
             <text x="118" y="22" text-anchor="middle" class="font-sans text-xs fill-surface-container" font-weight="bold">Commit</text>
        </g>
    </g>

    <!-- 3. History Toolbar (历史记录) -->
    <g transform="translate(20, 180)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 3: HISTORY</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- Branch Chip (Dropdown) -->
        <rect x="12" y="20" width="100" height="36" rx="8" class="fill-input" stroke="#444"/>
        <circle cx="28" cy="38" r="3" fill="#D0BCFF"/>
        <text x="40" y="42" class="font-sans text-sm fill-on-surface">main</text>
        <path d="M90 36 L95 41 L100 36" stroke="#8E8E93" fill="none"/>
        
        <!-- Filter Chips (Scrollable) -->
        <g transform="translate(120, 20)">
            <!-- Author Filter -->
            <rect x="0" y="0" width="80" height="36" rx="18" stroke="#444" fill="none"/>
            <text x="40" y="22" text-anchor="middle" class="font-sans text-xs fill-outline">Author</text>
            
            <!-- Date Filter -->
            <rect x="88" y="0" width="70" height="36" rx="18" stroke="#444" fill="none"/>
            <text x="123" y="22" text-anchor="middle" class="font-sans text-xs fill-outline">Date</text>
            
            <!-- Graph Toggle -->
            <rect x="166" y="0" width="36" height="36" rx="18" class="fill-input"/>
             <circle cx="178" cy="12" r="2" fill="#D0BCFF"/>
             <circle cx="178" cy="18" r="2" fill="#D0BCFF"/>
             <line x1="178" y1="12" x2="178" y2="18" stroke="#D0BCFF"/>
        </g>
    </g>

    <!-- 4. Diff Viewer Toolbar (差异查看) -->
    <g transform="translate(20, 260)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 8: DIFF VIEWER</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- File Navigator -->
        <text x="12" y="32" class="font-sans text-sm fill-on-surface">MainActivity.kt</text>
        <text x="12" y="50" class="font-mono text-xs fill-outline">File 2 of 5</text>
        
        <!-- Tools -->
        <g transform="translate(180, 20)">
            <!-- Prev/Next -->
            <rect x="0" y="0" width="70" height="36" rx="18" class="fill-input"/>
            <text x="20" y="22" text-anchor="middle" fill="#E6E1E5">←</text>
            <line x1="35" y1="8" x2="35" y2="28" stroke="#444"/>
            <text x="50" y="22" text-anchor="middle" fill="#E6E1E5">→</text>
            
            <!-- Settings (Gear) -->
            <rect x="80" y="0" width="36" height="36" rx="18" fill="none" class="stroke-border"/>
            <circle cx="98" cy="18" r="6" stroke="#8E8E93" stroke-width="1.5"/>
            
            <!-- View Mode (Split/Unified) -->
            <rect x="126" y="0" width="36" height="36" rx="8" class="fill-primary" fill-opacity="0.2"/>
            <text x="144" y="22" text-anchor="middle" class="font-sans text-xs fill-primary">Uni</text>
        </g>
    </g>

    <!-- ================= COLUMN 2 ================= -->

    <!-- 5. Pipelines Toolbar (流水线) -->
    <g transform="translate(420, 20)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 4: PIPELINES</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- Quick Filters -->
        <g transform="translate(12, 16)">
            <!-- All (Active) -->
            <rect width="50" height="24" rx="12" fill="#4F378B" fill-opacity="0.3" stroke="#D0BCFF"/>
            <text x="25" y="16" text-anchor="middle" class="font-sans text-xs fill-primary">All</text>
            
            <!-- Running -->
            <rect x="58" y="0" width="70" height="24" rx="12" stroke="#444" fill="none"/>
            <circle cx="70" cy="12" r="3" class="fill-primary"/>
            <text x="96" y="16" text-anchor="middle" class="font-sans text-xs fill-outline">Running</text>
            
            <!-- Failed -->
            <rect x="136" y="0" width="60" height="24" rx="12" stroke="#444" fill="none"/>
            <circle cx="148" cy="12" r="3" class="fill-error"/>
            <text x="172" y="16" text-anchor="middle" class="font-sans text-xs fill-outline">Failed</text>
        </g>
        
        <!-- Run Action -->
        <g transform="translate(310, 14)">
             <rect width="36" height="36" rx="18" class="fill-success" fill-opacity="0.2"/>
             <text x="18" y="23" text-anchor="middle" font-size="14" class="fill-success">▶</text>
        </g>
    </g>

    <!-- 6. Requests Toolbar (合并请求) -->
    <g transform="translate(420, 100)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 5: REQUESTS (PRs)</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- State Dropdown -->
        <rect x="12" y="20" width="90" height="36" rx="8" class="fill-input"/>
        <text x="30" y="42" class="font-sans text-sm fill-success">Open</text>
        <path d="M80 36 L85 41 L90 36" stroke="#8E8E93" fill="none"/>
        <circle cx="20" cy="38" r="3" class="fill-success"/>
        
        <!-- Search -->
        <rect x="110" y="20" width="140" height="36" rx="18" fill="none" class="stroke-border"/>
        <text x="130" y="42" class="font-sans text-sm fill-outline">Filter PRs...</text>
        
        <!-- New PR -->
        <rect x="260" y="20" width="88" height="36" rx="18" class="fill-primary"/>
        <text x="304" y="42" text-anchor="middle" class="font-sans text-sm fill-surface-container" font-weight="bold">+ New PR</text>
    </g>

    <!-- 7. Branches Toolbar (分支) -->
    <g transform="translate(420, 180)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 6: BRANCHES</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- Search Input -->
        <rect x="12" y="20" width="180" height="36" rx="18" class="fill-input"/>
        <text x="30" y="42" class="font-sans text-sm fill-outline">Find a branch...</text>
        
        <!-- Actions -->
        <g transform="translate(200, 20)">
            <!-- Filter Local/Remote -->
            <rect x="0" y="0" width="36" height="36" rx="8" class="fill-input"/>
            <path d="M10 12 L26 12 M14 18 L22 18 M16 24 L20 24" stroke="#E6E1E5" stroke-width="1.5"/>
            
            <!-- Delete Mode -->
            <rect x="44" y="0" width="36" height="36" rx="8" class="fill-input"/>
            <path d="M12 10 L24 10 L24 26 L12 26 Z" stroke="#E6E1E5" stroke-width="1.5" fill="none"/>
            <line x1="18" y1="8" x2="18" y2="28" stroke="#E6E1E5"/>
            
            <!-- New Branch -->
            <rect x="88" y="0" width="60" height="36" rx="18" class="fill-primary"/>
            <text x="118" y="22" text-anchor="middle" class="font-sans text-base fill-surface-container">+</text>
        </g>
    </g>

    <!-- 8. Stash Toolbar (暂存) -->
    <g transform="translate(420, 260)">
        <text x="0" y="0" class="font-sans text-xs fill-primary">PAGE 7: STASH</text>
        <rect x="0" y="10" width="360" height="56" rx="8" class="fill-surface-container"/>
        
        <!-- Stash Counter -->
        <rect x="12" y="20" width="100" height="36" rx="8" fill="none"/>
        <text x="12" y="42" class="font-sans text-base fill-primary">4 Stashed</text>
        
        <!-- Actions -->
        <g transform="translate(160, 20)">
            <!-- Search -->
            <rect x="0" y="0" width="36" height="36" rx="18" fill="none" stroke="#444"/>
            <circle cx="18" cy="18" r="5" stroke="#8E8E93" stroke-width="1.5" fill="none"/>
            
            <!-- Clear All Button -->
            <rect x="44" y="0" width="100" height="36" rx="8" class="fill-error" fill-opacity="0.15"/>
            <text x="94" y="22" text-anchor="middle" class="font-sans text-sm fill-error" font-weight="bold">Clear All</text>
            
            <!-- Menu -->
            <circle cx="160" cy="18" r="2" fill="#E6E1E5"/>
            <circle cx="160" cy="12" r="2" fill="#E6E1E5"/>
            <circle cx="160" cy="24" r="2" fill="#E6E1E5"/>
        </g>
    </g>

</svg>