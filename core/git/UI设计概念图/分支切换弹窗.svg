<svg width="400" height="840" viewBox="0 0 400 840" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="shadow-lg" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        <style>
            .font-sans { font-family: 'Roboto', sans-serif; }
            .font-mono { font-family: 'Roboto Mono', monospace; }
            .fill-bg { fill: #000000; }
            .fill-surface { fill: #1E1E1E; }
            .fill-surface-container { fill: #252525; }
            .fill-surface-bright { fill: #383838; }
            .fill-primary { fill: #D0BCFF; }
            .fill-on-surface { fill: #E6E1E5; }
            .fill-outline { fill: #8E8E93; }
        </style>
    </defs>

    <!-- 背景手机外壳 -->
    <rect width="400" height="840" rx="30" class="fill-bg" stroke="#333" stroke-width="8"/>

    <!-- 背景页面（被压暗） -->
    <g transform="translate(20, 40)" opacity="0.4">
        <rect width="360" height="44" class="fill-surface-container"/>
        <text x="340" y="27" text-anchor="middle" class="font-sans" font-size="11" fill="#CAC4D0">...</text>
        <rect y="44" width="360" height="740" class="fill-bg"/>
    </g>

    <!-- 遮罩层 -->
    <rect x="20" y="40" width="360" height="780" fill="#000000" fill-opacity="0.6"/>

    <!-- === 交互核心：带搜索的弹窗 === -->
    <g transform="translate(20, 80)">
        
        <!-- Toolbar Trigger (Active) -->
        <g transform="translate(8, 6)">
             <rect width="130" height="32" rx="6" fill="#4F378B" stroke="#D0BCFF" stroke-width="1"/>
             <text x="32" y="20" class="font-sans" font-size="12" fill="#E6E1E5" font-weight="bold">feature/ui-v2</text>
             <circle cx="16" cy="16" r="3" fill="#D0BCFF"/>
             <path d="M115 20 L120 12 L125 20" fill="#D0BCFF"/>
        </g>
        
        <!-- POPUP BODY -->
        <g transform="translate(8, 42)" filter="url(#shadow-lg)">
            <!-- Arrow -->
            <path d="M20 0 L26 -6 L32 0 Z" fill="#2B2930"/>
            
            <rect width="240" height="300" rx="12" fill="#2B2930"/>
            
            <!-- 1. SEARCH BAR (NEW FEATURE) -->
            <g transform="translate(12, 12)">
                <rect width="216" height="32" rx="16" class="fill-surface-bright"/>
                <!-- Search Icon -->
                <circle cx="16" cy="16" r="5" stroke="#8E8E93" stroke-width="1.5" fill="none"/>
                <line x1="20" y1="20" x2="24" y2="24" stroke="#8E8E93" stroke-width="1.5"/>
                <!-- Placeholder -->
                <text x="36" y="20" class="font-sans" font-size="12" fill="#8E8E93">Filter branches...</text>
            </g>

            <line x1="0" y1="56" x2="240" y2="56" stroke="#49454F" stroke-width="0.5"/>

            <!-- 2. BRANCH LIST -->
            <g transform="translate(0, 64)">
                <!-- Local Header -->
                <text x="12" y="10" class="font-sans" font-size="10" fill="#8E8E93" font-weight="bold">LOCAL</text>
                
                <!-- Item 1: Current -->
                <rect x="4" y="18" width="232" height="36" rx="4" fill="#4F378B" fill-opacity="0.3"/>
                <text x="16" y="40" class="font-sans" font-size="13" fill="#D0BCFF" font-weight="bold">feature/ui-v2</text>
                <path d="M210 36 L220 26" stroke="#D0BCFF" stroke-width="2"/> <!-- Check -->
                <path d="M210 36 L206 32" stroke="#D0BCFF" stroke-width="2"/>

                <!-- Item 2 -->
                <text x="16" y="75" class="font-sans" font-size="13" fill="#E6E1E5">main</text>
                
                <!-- Item 3 -->
                <text x="16" y="105" class="font-sans" font-size="13" fill="#E6E1E5">dev</text>
                
                <!-- Remote Header -->
                <text x="12" y="135" class="font-sans" font-size="10" fill="#8E8E93" font-weight="bold">REMOTE</text>
                
                <!-- Remote Item -->
                <text x="16" y="160" class="font-sans" font-size="13" fill="#E6E1E5">origin/main</text>
                
                <!-- Create New Button (Footer) -->
                <g transform="translate(0, 186)">
                    <rect width="240" height="50" fill="#252525" rx="0 0 12 12"/>
                    <line x1="0" y1="0" x2="240" y2="0" stroke="#333"/>
                    <text x="120" y="30" text-anchor="middle" class="font-sans" font-size="13" fill="#D0BCFF">+ New Branch</text>
                </g>
            </g>
        </g>
    </g>
</svg>