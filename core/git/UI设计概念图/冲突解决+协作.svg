<svg width="800" height="860" viewBox="0 0 800 860" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .text-xs { font-size: 11px; font-weight: 500; }
        .text-sm { font-size: 13px; }
        .text-base { font-size: 15px; font-weight: 700; }
        
        .fill-bg { fill: #000000; }
        .fill-surface { fill: #1E1E1E; }
        .fill-surface-container { fill: #252525; }
        .fill-primary { fill: #D0BCFF; }
        .fill-on-surface { fill: #E6E1E5; }
        .fill-outline { fill: #8E8E93; }
        
        /* Conflict Colors */
        .fill-yours-bg { fill: rgba(100, 181, 246, 0.1); }
        .fill-yours-border { fill: #64B5F6; }
        .fill-theirs-bg { fill: rgba(255, 183, 77, 0.1); }
        .fill-theirs-border { fill: #FFB74D; }
    </style>
    
    <rect width="800" height="860" fill="#121212"/>

    <!-- ================= SCREEN 3: CONFLICT RESOLVER ================= -->
    <g transform="translate(20, 20)">
        <text x="20" y="-10" class="font-sans text-base fill-on-surface">3. 冲突解决 (Conflict Resolver)</text>
        <rect width="360" height="800" rx="20" class="fill-bg" stroke="#333" stroke-width="4"/>
        
        <!-- Warning Header -->
        <rect width="360" height="80" class="fill-surface-container"/>
        <rect width="360" height="40" fill="#F28B82"/>
        <text x="180" y="25" text-anchor="middle" class="font-sans text-sm" fill="#000" font-weight="bold">! 1 CONFLICT DETECTED</text>
        
        <text x="20" y="65" class="font-sans text-base fill-on-surface">UserAdapter.kt</text>
        <text x="300" y="65" class="font-sans text-xs fill-outline">1/1</text>

        <!-- Conflict Content -->
        <g transform="translate(16, 100)">
            
            <!-- SECTION: THEIRS (Incoming) -->
            <g>
                <rect width="328" height="80" rx="4" class="fill-theirs-bg" stroke="#FFB74D" stroke-dasharray="4 2"/>
                <rect width="60" height="20" rx="0 0 4 0" fill="#FFB74D"/>
                <text x="5" y="14" class="font-sans text-xs" fill="#000" font-weight="bold">THEIRS</text>
                <text x="220" y="14" class="font-mono text-xs fill-theirs-border">origin/main</text>
                
                <text x="12" y="40" class="font-mono text-sm fill-on-surface">val name = user.fullName</text>
                <text x="12" y="60" class="font-mono text-sm fill-on-surface">val age = user.age</text>
            </g>

            <!-- Divider -->
            <rect y="90" width="328" height="20" fill="#333"/>
            <text x="164" y="104" text-anchor="middle" class="font-sans text-xs fill-outline">CONFLICT MARKER</text>

            <!-- SECTION: YOURS (Current) -->
            <g transform="translate(0, 120)">
                <rect width="328" height="80" rx="4" class="fill-yours-bg" stroke="#64B5F6" stroke-dasharray="4 2"/>
                <rect width="60" height="20" rx="0 0 4 0" fill="#64B5F6"/>
                <text x="5" y="14" class="font-sans text-xs" fill="#000" font-weight="bold">YOURS</text>
                <text x="220" y="14" class="font-mono text-xs fill-yours-border">HEAD</text>
                
                <text x="12" y="40" class="font-mono text-sm fill-on-surface">val name = user.getName()</text>
                <text x="12" y="60" class="font-mono text-sm fill-on-surface">// Refactored getter</text>
            </g>
            
            <!-- RESULT PREVIEW (Editable) -->
            <text x="0" y="240" class="font-sans text-sm fill-outline">Result Preview:</text>
            <rect y="250" width="328" height="100" rx="4" stroke="#555" fill="#1E1E1E"/>
            <text x="12" y="270" class="font-mono text-sm fill-outline">// Choose a version...</text>

        </g>

        <!-- Bottom Actions -->
        <g transform="translate(0, 720)">
            <rect width="360" height="80" class="fill-surface-container"/>
            <g transform="translate(16, 16)">
                <rect width="156" height="48" rx="24" stroke="#64B5F6" fill="rgba(100, 181, 246, 0.1)"/>
                <text x="78" y="29" text-anchor="middle" class="font-sans text-sm fill-yours-border" font-weight="bold">Keep Yours</text>
                
                <rect x="172" width="156" height="48" rx="24" stroke="#FFB74D" fill="rgba(255, 183, 77, 0.1)"/>
                <text x="250" y="29" text-anchor="middle" class="font-sans text-sm fill-theirs-border" font-weight="bold">Keep Theirs</text>
            </g>
        </g>
    </g>

    <!-- ================= SCREEN 4: COLLABORATION (Merged Tab) ================= -->
    <g transform="translate(420, 20)">
        <text x="20" y="-10" class="font-sans text-base fill-on-surface">4. 协作聚合 (Collaboration)</text>
        <rect width="360" height="800" rx="20" class="fill-bg" stroke="#333" stroke-width="4"/>
        
        <!-- Header -->
        <rect width="360" height="50" class="fill-surface-container"/>
        <text x="180" y="30" text-anchor="middle" class="font-sans text-base fill-on-surface">协作 (Remote)</text>

        <!-- Segmented Control (Tabs) -->
        <g transform="translate(16, 66)">
            <rect width="328" height="36" rx="18" fill="#2B2930" stroke="#444"/>
            <!-- Active Segment: PRs -->
            <rect width="160" height="32" rx="16" x="2" y="2" fill="#4F378B"/>
            <text x="82" y="23" text-anchor="middle" class="font-sans text-sm" fill="#fff" font-weight="bold">Pull Requests</text>
            
            <!-- Inactive Segment: Pipelines -->
            <text x="246" y="23" text-anchor="middle" class="font-sans text-sm" fill="#8E8E93">Pipelines</text>
            
            <!-- Badge for PRs -->
            <circle cx="140" cy="10" r="8" fill="#B3261E" stroke="#2B2930"/>
            <text x="140" y="13" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">2</text>
        </g>

        <!-- Content Area (PR List) -->
        <g transform="translate(16, 120)">
            <text class="font-sans text-xs fill-outline" y="-10">Open Requests (2)</text>
            
            <!-- PR Card 1 -->
            <rect width="328" height="120" rx="8" class="fill-surface-container"/>
            <g transform="translate(12, 16)">
                <text x="0" y="0" class="font-sans text-base fill-on-surface">Implement Dark Mode</text>
                <text x="0" y="20" class="font-sans text-xs fill-outline">#45 • opened by AndroidZero</text>
                
                <line x1="0" y1="36" x2="304" y2="36" stroke="#333"/>
                
                <g transform="translate(0, 50)">
                    <!-- CI Status -->
                    <circle cx="6" cy="6" r="6" fill="#81C784"/>
                    <path d="M3 6L5 8L9 4" stroke="#000" stroke-width="1.5" fill="none"/>
                    <text x="18" y="10" class="font-sans text-xs fill-success">Build Passing</text>
                    
                    <!-- Review Status -->
                    <text x="0" y="30" class="font-sans text-xs fill-warning">⚠ Needs 1 Review</text>
                </g>
                
                <!-- Avatar Stack -->
                <g transform="translate(260, 50)">
                    <circle cx="0" cy="0" r="10" fill="#D0BCFF" stroke="#252525"/>
                    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#000">A</text>
                    <circle cx="15" cy="0" r="10" fill="#333" stroke="#8E8E93" stroke-width="1"/>
                </g>
            </g>
            
            <!-- PR Card 2 -->
             <g transform="translate(0, 132)">
                <rect width="328" height="80" rx="8" class="fill-surface-container"/>
                <text x="12" y="26" class="font-sans text-base fill-on-surface">Fix crash on API 21</text>
                <text x="12" y="46" class="font-sans text-xs fill-outline">#44 • opened by Contributor</text>
            </g>
        </g>
    </g>
</svg>