<svg width="400" height="840" viewBox="0 0 400 840" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 定义样式与滤镜 -->
    <defs>
        <filter id="shadow-lg-2" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        <style>
            .font-sans { font-family: 'Roboto', sans-serif; }
            .font-mono { font-family: 'Roboto Mono', monospace; }
            .fill-bg { fill: #000000; }
            .fill-surface { fill: #1E1E1E; }
            .fill-surface-container { fill: #252525; }
            .fill-primary { fill: #D0BCFF; }
            .fill-on-surface { fill: #E6E1E5; }
            .fill-outline { fill: #8E8E93; }
        </style>
    </defs>

    <!-- 1. 背景手机外壳 -->
    <rect width="400" height="840" rx="30" class="fill-bg" stroke="#333" stroke-width="8"/>

    <!-- ================= 底层页面：暂存列表 (Tab 7) ================= -->
    <g transform="translate(20, 40)">
        <!-- Tab Bar -->
        <rect width="360" height="40" class="fill-surface-container"/>
        <text x="330" y="25" text-anchor="middle" class="font-sans" font-size="11" fill="#D0BCFF" font-weight="bold">暂存</text>
        <rect x="310" y="38" width="40" height="2" class="fill-primary"/>
        <text x="270" y="25" text-anchor="middle" class="font-sans" font-size="11" fill="#CAC4D0">分支</text>

        <!-- Content Area -->
        <rect y="84" width="360" height="700" class="fill-bg"/>

        <!-- Stash List Items (作为背景内容) -->
        <g transform="translate(16, 100)">
            <text class="font-sans" font-size="12" fill="#8E8E93">Saved Changes</text>
            
            <!-- Item 1 -->
            <rect y="15" width="328" height="90" rx="8" class="fill-surface-container"/>
            <text x="12" y="35" class="font-mono" font-size="13" fill="#D0BCFF" font-weight="bold">stash@{0}</text>
            <text x="250" y="35" class="font-sans" font-size="11" fill="#8E8E93">2 hours ago</text>
            <text x="12" y="60" class="font-sans" font-size="13" fill="#E6E1E5">WIP on feature/ui: Fix login crash</text>
            
            <!-- Item 2 -->
            <rect y="115" width="328" height="90" rx="8" class="fill-surface-container"/>
            <text x="12" y="135" class="font-mono" font-size="13" fill="#E6E1E5">stash@{1}</text>
            <text x="12" y="160" class="font-sans" font-size="13" fill="#E6E1E5">On main: Experiment with colors</text>
        </g>
    </g>

    <!-- ================= 遮罩层 (Dimming) ================= -->
    <rect x="20" y="40" width="360" height="780" fill="#000000" fill-opacity="0.6"/>

    <!-- ================= 交互层：顶部菜单区域 ================= -->
    <g transform="translate(20, 40)">
        
        <!-- Context Menu Button (Highlighted) -->
        <g transform="translate(320, 0)">
             <rect width="40" height="40" fill="#2B2930" rx="20"/>
             <circle cx="20" cy="14" r="2" fill="#E6E1E5"/>
             <circle cx="20" cy="20" r="2" fill="#E6E1E5"/>
             <circle cx="20" cy="26" r="2" fill="#E6E1E5"/>
        </g>

        <!-- === POPUP: CONTEXT MENU === -->
        <g transform="translate(130, 45)" filter="url(#shadow-lg-2)">
            <!-- Arrow Tip (Pointing Top Right) -->
            <path d="M200 0 L206 -6 L212 0 Z" fill="#2B2930"/>
            
            <!-- Popup Body -->
            <rect width="220" height="280" rx="12" fill="#2B2930"/>
            
            <!-- 1. User Profile Section -->
            <g transform="translate(16, 16)">
                <circle cx="16" cy="16" r="16" fill="#D0BCFF"/>
                <text x="16" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">AZ</text>
                
                <text x="42" y="14" class="font-sans" font-size="14" fill="#E6E1E5" font-weight="bold">Android Zero</text>
                <text x="42" y="30" class="font-sans" font-size="11" fill="#8E8E93">dev@android.zero</text>
            </g>
            
            <line x1="0" y1="56" x2="220" y2="56" stroke="#49454F" stroke-width="0.5"/>
            
            <!-- 2. Menu Options -->
            <g transform="translate(0, 60)">
                <!-- Auth -->
                <g transform="translate(16, 12)">
                     <text x="24" y="14" class="font-sans" font-size="14" fill="#E6E1E5">认证 (Token / Auth)</text>
                     <circle cx="8" cy="10" r="2" fill="#D0BCFF"/>
                </g>
                
                <!-- SSH -->
                 <g transform="translate(16, 48)">
                     <text x="24" y="14" class="font-sans" font-size="14" fill="#E6E1E5">SSH 密钥管理</text>
                     <rect x="6" y="8" width="4" height="4" fill="#8E8E93"/>
                </g>
                
                <!-- Git Config -->
                 <g transform="translate(16, 84)">
                     <text x="24" y="14" class="font-sans" font-size="14" fill="#E6E1E5">全局 Git 配置</text>
                     <rect x="6" y="8" width="4" height="4" fill="#8E8E93"/>
                </g>
                
                <!-- Separator -->
                <line x1="16" y1="120" x2="204" y2="120" stroke="#49454F" stroke-width="0.5"/>
                
                <!-- Settings -->
                <g transform="translate(16, 136)">
                     <text x="24" y="14" class="font-sans" font-size="14" fill="#E6E1E5">设置 (Settings)</text>
                     <circle cx="8" cy="10" r="4" stroke="#8E8E93" stroke-width="1.5" fill="none"/>
                </g>

                <!-- Help -->
                <g transform="translate(16, 172)">
                     <text x="24" y="14" class="font-sans" font-size="14" fill="#E6E1E5">帮助与反馈</text>
                     <text x="8" y="14" font-size="12" fill="#8E8E93">?</text>
                </g>
            </g>
        </g>
    </g>
</svg>