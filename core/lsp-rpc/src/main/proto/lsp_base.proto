syntax = "proto3";

package com.itsaky.androidide.lsp.rpc;

option java_multiple_files = true;
option java_package = "com.itsaky.androidide.lsp.rpc";

// 位置编码 (LSP 3.17 新增)
enum PositionEncodingKind {
    UTF8 = 0;
    UTF16 = 1;
    UTF32 = 2;
}

// 基础位置信息
message Position {
    uint32 line = 1;      // 0-based
    uint32 character = 2; // 0-based
}

// 文本范围
message Range {
    Position start = 1;
    Position end = 2;
}

// 资源位置标识
message Location {
    string uri = 1;
    Range range = 2;
}

// 跨文件跳转链接
message LocationLink {
    Range origin_selection_range = 1;
    string target_uri = 2;
    Range target_range = 3;
    Range target_selection_range = 4;
}

// 标准化 Either 容器 (LSP 核心逻辑)
// 用于处理：一个结果可能是 A 或者是 B 的情况（例如 ID 可以是 String 或 Integer）
message LspId {
    oneof value {
        string string_id = 1;
        int64 number_id = 2;
    }
}

// 进度 Token
message ProgressToken {
    oneof value {
        string string_token = 1;
        int64 number_token = 2;
    }
}