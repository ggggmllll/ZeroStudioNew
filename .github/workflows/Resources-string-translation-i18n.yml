name: AI String Translation (Safe & Format Preserved)

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'SiliconFlow API Key (Hidden in logs)'
        required: true
      base_url:
        description: 'API Base URL'
        default: 'https://api.siliconflow.cn'
      target_files:
        description: 'Target XML files (e.g. strings.xml, titles.xml)'
        default: 'strings.xml'
        required: true

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.10', cache: 'pip' }
        
      - run: pip install openai

      - name: Mask API Key
        # 将输入的 key 添加到 mask，防止在日志中泄露
        run: |
          echo "::add-mask::${{ github.event.inputs.api_key }}"

      - name: Run AI Translation
        env: 
          PYTHONUNBUFFERED: 1
          # 将 Key 通过环境变量传递，比通过 --api_key 参数更安全
          SF_API_KEY: ${{ github.event.inputs.api_key }}
        run: |
          python translate_android.py \
            --base_url "${{ github.event.inputs.base_url }}" \
            --files "${{ github.event.inputs.target_files }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: translated-xml
          path: |
             core/**/values-*/*.xml
          retention-days: 7
