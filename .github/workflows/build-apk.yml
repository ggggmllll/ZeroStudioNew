name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the compilation type'
        required: true
        default: 'assembleRelease --build-cache'
        type: choice
        options:
          - assemble --build-cache
          - assembleDebug --build-cache
          - assembleRelease --build-cache

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install basic system dependency packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip protobuf-compiler python3 python3-pip wget curl

      - name: Configure JDK 21 (Zulu 21.0.9)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Configuring a Gradle 8.13 environment
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Install the specified NDK and Android SDK CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"
          
      - name: Install higher CMake version (3.31.1) via pip
        run: |
          sudo pip3 install cmake==3.31.1 --break-system-packages
          CMAKE_DATA_DIR=$(python3 -c "import cmake, os; print(os.path.join(os.path.dirname(cmake.__file__), 'data'))")
          echo "cmake.dir=$CMAKE_DATA_DIR" >> local.properties
          
          cmake --version
          protoc --version
          python3 --version

      - name: Grant execution permissions to the Gradle wrapper
        run: chmod +x ./gradlew

      #Limiting Gradle JVM memory and CMake concurrency
      - name: Compile APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx5g -XX:MaxMetaspaceSize=1g' -Dorg.gradle.daemon=false"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
        run: |
          gradle ${{ github.event.inputs.build_type }} --stacktrace --max-workers=2

      - name: Find and centralize APKs
        run: |
          mkdir -p output_apks
          find core/app/build/outputs/apk/ -name "*.apk" -exec cp {} output_apks/ \;

      - name: Upload arm64-v8a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: output_apks/*arm64-v8a*release*.apk
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload armeabi-v7a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release
          path: output_apks/*armeabi-v7a*release*.apk
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload x86_64 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-release
          path: output_apks/*x86_64*release*.apk
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload arm64-v8a Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-debug
          path: output_apks/*arm64-v8a*debug*.apk
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload armeabi-v7a Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-debug
          path: output_apks/*armeabi-v7a*debug*.apk
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload x86_64 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-debug
          path: output_apks/*x86_64*debug*.apk
          compression-level: 0
          if-no-files-found: ignore